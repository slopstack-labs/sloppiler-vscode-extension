name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    name: Type-check & bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Bundle (production)
        run: npm run package

      - name: Verify package builds
        run: npx --yes @vscode/vsce@latest package --no-dependencies -o sloppiler.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: sloppiler-vsix
          path: sloppiler.vsix
